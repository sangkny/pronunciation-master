services:
  postgres:
    image: postgres:16-alpine
    container_name: pronunciation-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pronunciation_master
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - pronunciation-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d pronunciation_master"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pronunciation-backend
    ports:
      - "5000:5000"
    environment:
      - LLM_PROVIDER=lmstudio
      - LMSTUDIO_API_URL=http://host.docker.internal:1234/v1
      - LMSTUDIO_MODEL=google/gemma-4-e4b
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=pronunciation_master
      - DB_USER=dev
      - DB_PASSWORD=devpass
      - JWT_SECRET=pronunciation-master-dev-secret-change-in-production
      - JWT_EXPIRES_IN=24h
      - STRIPE_PUBLIC_KEY=pk_test_placeholder
      - STRIPE_SECRET_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pronunciation-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pronunciation-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    networks:
      - pronunciation-network

networks:
  pronunciation-network:
    driver: bridge
